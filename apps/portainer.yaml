
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portainer
  namespace: portainer
spec:
  project: default
  sources:
    - chart: portainer
      repoURL: portainer/portainer-ee
      targetRevision: 1.0.0
      helm:
        values: |
          ingress:
            annotations: 
              kubernetes.io/ingress.class: traefik
              cert-manager.io/cluster-issuer: letsencrypt-prod
            enabled: true
            hosts:
              - host: portainer.admondtamang.com.np
                paths:
                  - /
            tls:
              - hosts:
                  - portainer.admondtamang.com.np
                secretName: n8n-tls

  destination:
    namespace: default
    name: in-cluster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
