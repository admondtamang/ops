apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nats
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - chart: nats
      repoURL: https://nats-io.github.io/k8s/helm/charts/
      targetRevision: 2.14.2
      helm:
        values: |
          service:
            type: LoadBalancer
            port: 9222
            targetPort: 4222
          config:
            monitor:
              enabled: true
            jetstream:
              enabled: true
              fileStore:
                pvc:
                  storageClassName: local-path
            websocket:
              enabled: true
              ingress:
                enabled: true
                hosts:
                  - nats.admondtamang.com.np
                className: traefik
                tlsSecretName: nats-tls
                merge:
                  metadata:
                    annotations:
                      cert-manager.io/cluster-issuer: letsencrypt-prod
            merge:
              authorization:
                user: nats
                password: "nats_password"
                timeout: 2
          container:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

  destination:
    namespace: default
    name: in-cluster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
